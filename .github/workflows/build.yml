name: Build hats
on:
  schedule:
    - cron: "0 0 * * 0"
  push:
  workflow_dispatch:

permissions:
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ github.token }}

jobs:
  list-hats:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      matrix_not_empty: ${{ steps.check-matrix.outputs.matrix_not_empty }}
    steps:
      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install just --yes
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - run: git fetch origin main
      - id: set-matrix
        run: |
          set -euxo pipefail
          if [ "$GITHUB_REF" == "refs/heads/main" ]; then
            echo "matrix=$(just list-as-json list-hats)" | tee "$GITHUB_OUTPUT"
          else
            echo "matrix=$(just list-as-json list-changed-hats)" | tee "$GITHUB_OUTPUT"
          fi
      - id: check-matrix
        run: |
          set -euxo pipefail
          if echo '${{ steps.set-matrix.outputs.matrix }}' | jq -e '. | length > 0' > /dev/null 2>&1; then
            echo "matrix_not_empty=true" | tee -a "$GITHUB_OUTPUT"
          elif [ "$GITHUB_REF" == "refs/heads/main" ]; then
            echo "::error::Empty matrix on main — this should never happen"
            exit 1
          else
            echo "matrix_not_empty=false" | tee -a "$GITHUB_OUTPUT"
          fi

  build-image:
    name: Build and push image
    needs: [list-hats]
    if: needs.list-hats.outputs.matrix_not_empty == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'main' || '' }}
    strategy:
        max-parallel: 1
        fail-fast: false
        matrix:
            hat: ${{ fromJson(needs.list-hats.outputs.matrix) }}

    outputs:
      registry-path: ${{ steps.push.outputs.registry-path }}
    steps:
      - name: Setup cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.0"

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install just --yes

      - name: Install trunkver
        run: |
          set -x
          TMP_DIR=$(mktemp -d)
          cd "$TMP_DIR"
          curl --proto =https --tlsv1.2 -sSfL \
            -o trunkver_linux_amd64 "https://github.com/crftd-tech/trunkver/releases/download/1.1.3-20260513201613-gf9fdd7b-25823944761-1/trunkver_linux_amd64" \
            -o trunkver_linux_amd64.cosign.bundle "https://github.com/crftd-tech/trunkver/releases/download/1.1.3-20260513201613-gf9fdd7b-25823944761-1/trunkver_linux_amd64.cosign.bundle" \
            -o checksums.txt "https://github.com/crftd-tech/trunkver/releases/download/1.1.3-20260513201613-gf9fdd7b-25823944761-1/checksums.txt" \
            -o checksums.txt.cosign.bundle "https://github.com/crftd-tech/trunkver/releases/download/1.1.3-20260513201613-gf9fdd7b-25823944761-1/checksums.txt.cosign.bundle"

          cosign verify-blob \
            "checksums.txt" \
            --bundle "checksums.txt.cosign.bundle" \
            --certificate-identity=https://github.com/crftd-tech/trunkver/.github/workflows/build.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com

          shasum --algorithm 256 --ignore-missing --check checksums.txt

          cosign verify-blob \
            "trunkver_linux_amd64" \
            --bundle "trunkver_linux_amd64.cosign.bundle" \
            --certificate-identity=https://github.com/crftd-tech/trunkver/.github/workflows/build.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          
          mkdir -p "$HOME/.local/bin/" || true
          cp "trunkver_linux_amd64" "$HOME/.local/bin/trunkver"
          chmod a+x "$HOME/.local/bin/trunkver"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          registry: ${{ env.IMAGE_REGISTRY }}

      - name: Build image
        run: |
          just build "${{ matrix.hat }}"
        env:
          KERNEL_SIGNING_CERTIFICATE_PEM: ${{ secrets.KERNEL_SIGNING_CERTIFICATE_PEM }}
          KERNEL_SIGNING_CERTIFICATE_KEY: ${{ secrets.KERNEL_SIGNING_CERTIFICATE_KEY }}

      - name: Push Image
        if: github.ref == 'refs/heads/main'
        run: |
          just push "${{ matrix.hat }}"

      - name: Sign docker image
        if: github.ref == 'refs/heads/main'
        run: just sign "${{ matrix.hat }}"
